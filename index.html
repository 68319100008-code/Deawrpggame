<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokapon RPG - Singleplayer & Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a2e; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        h1 { color: #ffeb3b; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255, 235, 59, 0.5); }
        .game-container { display: flex; flex-direction: column; gap: 20px; max-width: 1400px; width: 100%; background: #162447; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        
        /* ขยายกระดาน 7x7 (24 ช่อง) */
        .board { display: grid; grid-template-columns: repeat(7, 100px); grid-template-rows: repeat(7, 100px); gap: 5px; background: #1f4068; padding: 10px; border-radius: 10px; margin: 0 auto; }
        .cell { background: #444; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 5px; font-size: 10px; font-weight: bold; text-align: center; color: #fff; position: relative; }
        .cell.start { background: #00e676; color: #000; }
        .cell.monster { background: #ff5722; }
        .cell.chest { background: #ffc107; color: #000; }
        .cell.magictower { background: #9c27b0; }
        .cell.worldboss { background: #b71c1c; border: 2px dashed #ffeb3b; }
        .cell.shop { background: #00bcd4; color: #000; }
        
        .center-space { grid-column: 2 / 7; grid-row: 2 / 7; background: #162447; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; text-align: center; }
        .tokens-container { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; }
        .token { width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; z-index: 10; }
        .token.p0 { background: #ff3366; } .token.p1 { background: #33fffc; } .token.p2 { background: #ffeb3b; } .token.p3 { background: #8bc34a; }

        .controls-row { display: flex; gap: 15px; width: 100%; }
        .status-panel { display: flex; gap: 10px; flex: 3; flex-wrap: wrap; }
        .player-card { flex: 1; min-width: 200px; background: #1f4068; padding: 10px; border-radius: 10px; border: 3px solid transparent; position: relative; }
        .player-card.active { border-color: #00e676; }
        .player-card.stunned { opacity: 0.5; }
        .player-card h3 { margin: 0 0 5px 0; font-size: 14px; }
        .player-card p { margin: 3px 0; font-size: 12px; }
        .gold-text { color: #ffc107; font-weight: bold; }
        
        .action-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .btn-dice { background: #00e676; color: #000; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-dice:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .log-box { background: #121b34; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; font-size: 12px; line-height: 1.4; border: 1px solid #333; }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .box { background: #162447; padding: 30px; border-radius: 15px; border: 3px solid #00e676; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 0 20px #00e67655; }
        .box button { background: #00e676; padding: 10px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin: 5px; color: black; }
        
        /* ฉากต่อสู้ */
        .fighter { width: 45%; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 2px solid #444; }
        .hp-bar { background: #111; height: 12px; border-radius: 5px; overflow: hidden; margin: 5px 0; }
        .hp-fill { height: 100%; background: #00e676; transition: width 0.3s; }
        .btn-action { padding: 8px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; margin: 0 2px; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* ร้านค้า */
        .shop-item { background: #1f4068; padding: 10px; margin: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="overlay" id="setup-overlay">
        <div class="box">
            <h2>⚔️ Dokapon เลือกโหมดการเล่น ⚔️</h2>
            <div style="background: #1f4068; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                <h3 style="margin-top:0; color: #ffeb3b;">👤 เล่นคนเดียว (Offline)</h3>
                <label>จำนวนบอท (AI):</label>
                <select id="bot-count" style="padding: 5px;">
                    <option value="1">1 บอท (สู้ 1v1)</option>
                    <option value="2">2 บอท (เล่น 3 คน)</option>
                    <option value="3" selected>3 บอท (เล่น 4 คน)</option>
                </select><br><br>
                <button onclick="startSinglePlayer()">▶️ เริ่มเกมแบบออฟไลน์</button>
            </div>
            
            <div style="background: #1f4068; padding: 15px; border-radius: 10px;">
                <h3 style="margin-top:0; color: #33fffc;">🌐 เล่นกับเพื่อน (Online)</h3>
                <input type="text" id="room-input" placeholder="ชื่อห้อง..." style="padding:5px; margin-bottom:5px; width:80%;"><br>
                <select id="player-select" style="padding: 5px;">
                    <option value="0">P1 (สีแดง)</option>
                    <option value="1">P2 (สีฟ้า)</option>
                </select><br><br>
                <button onclick="connectToFirebase()">⚡ สร้าง/เข้าห้องออนไลน์</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="shop-overlay" style="display:none; z-index: 1001;">
        <div class="box" style="border-color: #00bcd4;">
            <h2 style="color: #00bcd4;">🛒 ร้านค้าลุงก็อบลิน</h2>
            <p>เงินของคุณ: <span id="shop-gold" class="gold-text">0</span> G</p>
            <div class="shop-item">
                <span>⚔️ ดาบเหล็กกล้า (+10 ATK)</span>
                <button onclick="buyItem('ดาบ', 10, 'atk', 100)">100 G</button>
            </div>
            <div class="shop-item">
                <span>🛡️ เกราะนักรบ (+30 HP)</span>
                <button onclick="buyItem('เกราะ', 30, 'hp', 150)">150 G</button>
            </div>
            <div class="shop-item">
                <span>🔮 คัมภีร์เวทไฟ (ปลดล็อกเวทมนตร์)</span>
                <button onclick="buyItem('เวทไฟ', 0, 'magic', 200)">200 G</button>
            </div>
            <button style="background: #e53935; color: white; width: 100%; margin-top: 15px;" onclick="closeShop()">❌ ออกจากร้าน</button>
        </div>
    </div>

    <div class="overlay" id="battle-overlay" style="display:none;">
        <div class="box" style="max-width: 700px; background: linear-gradient(135deg, #2c1a4d, #162447);">
            <h2 id="battle-header" style="color: #ffeb3b; margin-top:0;">⚔️ ปะทะเดือด!</h2>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="fighter" id="f-left">
                    <div id="f-left-name" style="font-size:18px; font-weight:bold;">P1</div>
                    <div style="font-size:12px;">LV <span id="f-left-lv">1</span></div>
                    <div class="hp-bar"><div class="hp-fill" id="f-left-hp"></div></div>
                    <div id="f-left-hp-text" style="font-size:12px;">100/100</div>
                </div>
                <div style="font-size: 24px; font-weight:bold;">VS</div>
                <div class="fighter" id="f-right">
                    <div id="f-right-name" style="font-size:18px; font-weight:bold;">Monster</div>
                    <div style="font-size:12px;">LV <span id="f-right-lv">1</span></div>
                    <div class="hp-bar"><div class="hp-fill" id="f-right-hp"></div></div>
                    <div id="f-right-hp-text" style="font-size:12px;">100/100</div>
                </div>
            </div>
            <div id="action-prompt" style="margin: 15px 0; font-weight: bold; color: #33fffc;">เลือกคำสั่งของคุณ:</div>
            <div style="display: flex; gap: 5px;" id="battle-buttons"></div>
            <div id="battle-log-text" style="margin-top: 15px; font-size: 13px; color: #00e676; height: 60px; overflow: hidden;"></div>
        </div>
    </div>

    <h1>⚔️ Dokapon RPG</h1>
    <div class="game-container" id="game-container">
        <div class="board" id="board"></div>
        <div class="controls-row">
            <div class="status-panel" id="players-panel">
                </div>
            <div class="action-panel">
                <button class="btn-dice" id="dice-btn" onclick="rollDice()">🎲 ทอยลูกเต๋า</button>
                <div class="log-box" id="log-box"></div>
            </div>
        </div>
    </div>

    <script>
        // ขยายกระดาน 24 ช่อง (เดินวนรอบขอบ 7x7)
        const boardData = [
            { id: 0, type: "start", name: "🏰 ปราสาท (จุดเริ่ม/ฮีล)", r: 1, c: 1 },
            { id: 1, type: "monster", name: "ทุ่งสไลม์", r: 1, c: 2 },
            { id: 2, type: "shop", name: "🛒 ร้านค้า", r: 1, c: 3 },
            { id: 3, type: "chest", name: "หีบสมบัติ", r: 1, c: 4 },
            { id: 4, type: "monster", name: "ถ้ำก็อบลิน", r: 1, c: 5 },
            { id: 5, type: "shop", name: "🛒 ร้านค้า", r: 1, c: 6 },
            { id: 6, type: "magictower", name: "หอคอยเวท", r: 1, c: 7 },
            { id: 7, type: "monster", name: "หุบเขาออร์ก", r: 2, c: 7 },
            { id: 8, type: "chest", name: "หีบเสบียง", r: 3, c: 7 },
            { id: 9, type: "monster", name: "ป่าเอลฟ์มืด", r: 4, c: 7 },
            { id: 10, type: "shop", name: "🛒 ร้านค้า", r: 5, c: 7 },
            { id: 11, type: "worldboss", name: "🌋 บอสโลก", r: 6, c: 7 },
            { id: 12, type: "magictower", name: "แท่นบูชา", r: 7, c: 7 },
            { id: 13, type: "monster", name: "สุสานโกเลม", r: 7, c: 6 },
            { id: 14, type: "shop", name: "🛒 ร้านค้า", r: 7, c: 5 },
            { id: 15, type: "chest", name: "หีบลับ", r: 7, c: 4 },
            { id: 16, type: "monster", name: "ป่าช้าวาลคิรี", r: 7, c: 3 },
            { id: 17, type: "shop", name: "🛒 ร้านค้า", r: 7, c: 2 },
            { id: 18, type: "magictower", name: "ห้องแปรธาตุ", r: 7, c: 1 },
            { id: 19, type: "monster", name: "ประตูมิติ", r: 6, c: 1 },
            { id: 20, type: "chest", name: "คลังสมบัติ", r: 5, c: 1 },
            { id: 21, type: "monster", name: "ถ้ำหมี", r: 4, c: 1 },
            { id: 22, type: "shop", name: "🛒 ร้านค้า", r: 3, c: 1 },
            { id: 23, type: "monster", name: "รังโจร", r: 2, c: 1 }
        ];

        let state = {};
        let myId = 0;
        let isOnline = false;
        let db, roomRef;
        const colors = ["#ff3366", "#33fffc", "#ffeb3b", "#8bc34a"];

        function createBoardUI() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '<div class="center-space"><h3>Dokapon<br>Multi-Mode</h3><p>ชนะเมื่อ LV 50</p></div>';
            boardData.forEach(cell => {
                const el = document.createElement('div');
                el.className = `cell ${cell.type}`;
                el.style.gridRow = cell.r; el.style.gridColumn = cell.c;
                el.innerHTML = `${cell.name}<div class="tokens-container" id="cell-${cell.id}"></div>`;
                boardEl.appendChild(el);
            });
        }

        // ================= SETUP เกม =================
        function initGameState(playerCount, botCount) {
            let players = [];
            for (let i = 0; i < playerCount; i++) {
                players.push({
                    id: i, name: i === 0 ? "P1 (คุณ)" : (i >= playerCount - botCount ? `Bot ${i}` : `P${i+1}`),
                    lv: 1, hp: 100, maxHp: 100, atk: 15, position: 0, isStunned: false, 
                    items: [], gold: 100, isBot: i >= playerCount - botCount
                });
            }
            return { turn: 0, gameActive: true, logs: ["🌟 เริ่มเกมแล้ว!"], players: players, combat: { active: false } };
        }

        function startSinglePlayer() {
            let botCount = parseInt(document.getElementById('bot-count').value);
            myId = 0; isOnline = false;
            state = initGameState(1 + botCount, botCount);
            startGameUI();
        }

        function connectToFirebase() {
            // โค้ดเชื่อมต่อ Firebase เดิม (ตัดย่อเพื่อประหยัดพื้นที่ สามารถใส่ apiKey ของคุณเองได้)
            alert("โหมดออนไลน์ยังไม่ได้ใส่ API Key รบกวนเล่นโหมดออฟไลน์ (เล่นคนเดียว) ไปก่อนนะครับ!");
        }

        function startGameUI() {
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            createBoardUI();
            updateUI();
        }

        function syncState() {
            if (isOnline) roomRef.set(state); // ถ้าออนไลน์ให้ส่งไปฐานข้อมูล
            else updateUI(); // ถ้าออฟไลน์ อัปเดตหน้าจอทันที
        }

        function pushLog(msg) {
            state.logs.push(msg);
            if (state.logs.length > 30) state.logs.shift();
            syncState();
        }

        function hasMagic(player) {
            return player.items.some(i => i.includes('เวท') || i.includes('เวทย์') || i.includes('🔮') || i.includes('⚡'));
        }

        function updateUI() {
            // สร้างการ์ดผู้เล่น
            const panel = document.getElementById('players-panel');
            panel.innerHTML = '';
            state.players.forEach((p, i) => {
                panel.innerHTML += `
                    <div class="player-card ${state.turn === i ? 'active' : ''} ${p.isStunned ? 'stunned' : ''}">
                        <h3 style="color:${colors[i]}">${p.name} ${p.isBot ? '🤖' : ''}</h3>
                        <p>LV: <b>${p.lv}</b> | ATK: ${p.atk}</p>
                        <p>HP: ${p.hp}/${p.maxHp} | <span class="gold-text">💰 ${p.gold} G</span></p>
                        <p style="font-size:10px; color:#aaa;">ของ: ${p.items.length ? p.items.join(',') : 'ไม่มี'}</p>
                    </div>`;
            });

            // อัปเดตโทเคนบนบอร์ด
            boardData.forEach(c => document.getElementById(`cell-${c.id}`).innerHTML = '');
            state.players.forEach(p => {
                document.getElementById(`cell-${p.position}`).innerHTML += `<div class="token p${p.id}"></div>`;
            });

            // อัปเดต Logs
            const logBox = document.getElementById('log-box');
            logBox.innerHTML = state.logs.map(m => `<div>${m}</div>`).join('');
            logBox.scrollTop = logBox.scrollHeight;

            // ปุ่มทอยเต๋า
            const btn = document.getElementById('dice-btn');
            let isMyTurn = (state.turn === myId);
            let isBotTurn = state.players[state.turn].isBot;
            
            if (!state.gameActive) { btn.disabled = true; btn.innerText = "เกมจบแล้ว!"; }
            else if (state.combat.active) { btn.disabled = true; btn.innerText = "⚔️ กำลังต่อสู้..."; }
            else if (isBotTurn) { btn.disabled = true; btn.innerText = "🤖 บอทกำลังคิด..."; setTimeout(botAction, 1000); }
            else if (isMyTurn) { btn.disabled = false; btn.innerText = "🎲 ทอยลูกเต๋า"; }
            else { btn.disabled = true; btn.innerText = "⏳ รอตาเพื่อน"; }

            updateCombatUI();
        }

        function nextTurn() {
            if(!state.gameActive) return;
            state.turn = (state.turn + 1) % state.players.length;
            syncState();
        }

        // ================= ระบบบอท (AI) =================
        function botAction() {
            if (state.combat.active || !state.players[state.turn].isBot) return;
            rollDice(); // บอททอยเต๋า
        }

        function botCombatAction() {
            let cmb = state.combat;
            let cAtk = cmb.currentAttacker; let cDef = cmb.currentDefender;
            
            // ให้บอทและมอนสเตอร์สุ่มสู้ (ถ้ามีเวทถึงจะใช้เวทได้)
            let pData = null;
            let isAttacking = false;
            
            if (cAtk !== -1 && state.players[cAtk].isBot && !cmb.attackerChoice) {
                pData = state.players[cAtk]; isAttacking = true;
            } else if (cDef !== -1 && state.players[cDef].isBot && !cmb.defenderChoice) {
                pData = state.players[cDef]; isAttacking = false;
            } else if (cAtk === -1 && !cmb.attackerChoice) {
                isAttacking = true; pData = cmb.defMonster; // มอนสเตอร์บุก
            } else if (cDef === -1 && !cmb.defenderChoice) {
                isAttacking = false; pData = cmb.defMonster; // มอนสเตอร์รับ
            } else { return; } // ไม่มีบอทต้องตัดสินใจ

            setTimeout(() => {
                let options = isAttacking ? ['🔥 ตีธรรมดา', '💥 ตีหนัก'] : ['🛡️ กันธรรมดา', '🛡️ กันหนัก'];
                if (pData === cmb.defMonster || hasMagic(pData)) {
                    options.push(isAttacking ? '🔮 ตีเวท' : '🔮 กันเวท'); // มอนและคนมีเวทใช้เวทได้
                }
                let choice = options[Math.floor(Math.random() * options.length)];
                submitCombatAction(choice, isAttacking ? cAtk : cDef, true);
            }, 800);
        }

        // ================= ระบบเดินบอร์ด =================
        function rollDice() {
            let p = state.players[state.turn];
            if (p.isStunned) {
                pushLog(`🥴 <b>${p.name}</b> หายมึนแล้ว ฟื้นเลือดเต็มหลอด ข้าม 1 เทิร์น!`);
                p.isStunned = false; p.hp = p.maxHp;
                nextTurn(); return;
            }

            let dice = Math.floor(Math.random() * 6) + 1;
            let oldPos = p.position;
            p.position = (oldPos + dice) % boardData.length;

            // ระบบเดินผ่านจุดเริ่มต้น (Pass Start)
            if (p.position < oldPos && p.position !== 0) {
                p.hp = p.maxHp;
                pushLog(`✨ <b>${p.name}</b> เดินผ่านปราสาท ได้รับการฟื้นฟู HP เต็ม!`);
            }

            let cell = boardData[p.position];
            pushLog(`🎲 <b>${p.name}</b> ทอยได้ ${dice} เดินตกช่อง <b>${cell.name}</b>`);

            // เช็คว่าเดินชนคนอื่นไหม (PVP)
            let enemyIndex = state.players.findIndex(e => e.id !== p.id && e.position === p.position && e.position !== 0);
            if (enemyIndex !== -1) {
                let enemy = state.players[enemyIndex];
                pushLog(`⚔️💥 <b>${p.name} ชน ${enemy.name}! ดวล PVP ล่าค่าหัว!</b>`);
                setupCombat(p.id, enemy.id, 'player', enemy);
                return;
            }

            handleCell(p, cell);
        }

        function handleCell(p, cell) {
            if (cell.type === 'start') {
                p.hp = p.maxHp; pushLog(`🏰 <b>${p.name}</b> กลับปราสาท ฟื้นเลือดเต็ม!`);
            } else if (cell.type === 'chest') {
                let goldFound = Math.floor(Math.random() * 50) + 50;
                p.gold += goldFound; pushLog(`🎁 เปิดหีบเจอเงิน <b>${goldFound} G</b>!`);
            } else if (cell.type === 'magictower') {
                if(!p.items.includes("🔮 เวทไฟ")) { p.items.push("🔮 เวทไฟ"); pushLog(`🔮 <b>${p.name}</b> เรียนรู้เวทมนตร์สำเร็จ!`); }
                else { pushLog(`🔮 เรียนเวทไปแล้ว ไม่มีอะไรเกิดขึ้น`); }
            } else if (cell.type === 'shop') {
                if (p.isBot) {
                    if (p.gold >= 100 && !p.items.includes("ดาบ")) { p.gold -= 100; p.atk += 10; p.items.push("ดาบ"); pushLog(`🛒 บอท ${p.name} ซื้อดาบ!`); }
                    else { pushLog(`🛒 บอทแวะดูร้านค้าเฉยๆ`); }
                } else {
                    document.getElementById('shop-gold').innerText = p.gold;
                    document.getElementById('shop-overlay').style.display = 'flex';
                    return; // รอคนกดซื้อ เลิกเทิร์นใน closeShop
                }
            } else if (cell.type === 'monster' || cell.type === 'worldboss') {
                let mLv = cell.type === 'worldboss' ? p.lv + 5 : Math.max(1, p.lv + (Math.floor(Math.random() * 3) - 1));
                let mName = cell.type === 'worldboss' ? "🐉 บอสมังกรโลก" : "👾 มอนสเตอร์";
                let mHp = mLv * 20 + 30; let mAtk = mLv * 6 + 10;
                setupCombat(p.id, -1, 'monster', { name: mName, lv: mLv, hp: mHp, maxHp: mHp, atk: mAtk });
                return;
            }
            nextTurn();
        }

        // ================= ระบบร้านค้า =================
        function buyItem(name, value, type, price) {
            let p = state.players[myId];
            if (p.gold >= price) {
                p.gold -= price;
                if(type === 'atk') p.atk += value;
                if(type === 'hp') { p.maxHp += value; p.hp += value; }
                p.items.push(name);
                document.getElementById('shop-gold').innerText = p.gold;
                pushLog(`🛒 <b>${p.name}</b> ซื้อ ${name} สำเร็จ!`);
                syncState();
            } else { alert("เงินไม่พอ!"); }
        }
        function closeShop() { document.getElementById('shop-overlay').style.display = 'none'; nextTurn(); }

        // ================= ระบบต่อสู้ =================
        function setupCombat(atkId, defId, type, defData) {
            state.combat = {
                active: true, type: type, initiatorIdx: atkId, currentAttacker: atkId, currentDefender: defId,
                attackerChoice: "", defenderChoice: "", log: "เริ่มการปะทะเดือด!", defMonster: type === 'monster' ? defData : null
            };
            syncState();
        }

        function updateCombatUI() {
            const cmb = state.combat;
            const overlay = document.getElementById('battle-overlay');
            if (!cmb.active) { overlay.style.display = 'none'; return; }
            overlay.style.display = 'flex';

            let isPvP = cmb.type === 'player';
            let leftIdx = isPvP ? cmb.initiatorIdx : cmb.initiatorIdx; 
            let rightIdx = isPvP ? (cmb.initiatorIdx === 0 ? cmb.currentDefender : cmb.currentDefender) : -1;
            
            // ฝั่งผู้ดึงเกมสู้ (ซ้าย)
            let pLeft = state.players[leftIdx];
            document.getElementById('f-left-name').innerText = pLeft.name;
            document.getElementById('f-left-lv').innerText = pLeft.lv;
            document.getElementById('f-left-hp-text').innerText = `${pLeft.hp}/${pLeft.maxHp}`;
            document.getElementById('f-left-hp').style.width = (pLeft.hp / pLeft.maxHp * 100) + '%';
            document.getElementById('f-left').style.borderColor = cmb.currentAttacker === leftIdx ? '#ff3366' : '#2196f3';

            // ฝั่งศัตรู (ขวา)
            let pRight = isPvP ? state.players[cmb.currentDefender === leftIdx ? cmb.currentAttacker : cmb.currentDefender] : cmb.defMonster;
            document.getElementById('f-right-name').innerText = pRight.name;
            document.getElementById('f-right-lv').innerText = pRight.lv;
            document.getElementById('f-right-hp-text').innerText = `${pRight.hp}/${pRight.maxHp}`;
            document.getElementById('f-right-hp').style.width = (pRight.hp / pRight.maxHp * 100) + '%';
            document.getElementById('f-right').style.borderColor = cmb.currentAttacker !== leftIdx ? '#ff3366' : '#2196f3';

            document.getElementById('battle-log-text').innerHTML = cmb.log;

            // สร้างปุ่มกด
            let btnZone = document.getElementById('battle-buttons');
            let amIInvolved = (myId === cmb.currentAttacker || myId === cmb.currentDefender);
            let myPlayer = state.players[myId];
            let hasMag = hasMagic(myPlayer); // เช็คว่ามีเวทไหม

            if (!amIInvolved || myPlayer.isBot) {
                btnZone.innerHTML = "<p>⏳ กำลังดูการต่อสู้ / บอทกำลังตัดสินใจ...</p>";
                botCombatAction();
            } else if (myId === cmb.currentAttacker && !cmb.attackerChoice) {
                btnZone.innerHTML = `
                    <button class="btn-action" style="background:#ff9800" onclick="submitCombatAction('🔥 ตีธรรมดา')">🔥 ตีธรรมดา</button>
                    <button class="btn-action" style="background:#e53935;color:white" onclick="submitCombatAction('💥 ตีหนัก')">💥 ตีหนัก</button>
                    <button class="btn-action" style="background:#9c27b0;color:white" ${!hasMag ? 'disabled' : ''} onclick="submitCombatAction('🔮 ตีเวท')">🔮 ตีเวท ${!hasMag?'(ล็อก)':''}</button>`;
            } else if (myId === cmb.currentDefender && !cmb.defenderChoice) {
                btnZone.innerHTML = `
                    <button class="btn-action" style="background:#4caf50" onclick="submitCombatAction('🛡️ กันธรรมดา')">🛡️ กันธรรมดา</button>
                    <button class="btn-action" style="background:#03a9f4" onclick="submitCombatAction('🛡️ กันหนัก')">🛡️ กันหนัก</button>
                    <button class="btn-action" style="background:#e91e63;color:white" ${!hasMag ? 'disabled' : ''} onclick="submitCombatAction('🔮 กันเวท')">🔮 กันเวท ${!hasMag?'(ล็อก)':''}</button>`;
            }

            if (cmb.attackerChoice && cmb.defenderChoice && !cmb.resolving) {
                cmb.resolving = true;
                setTimeout(resolveCombat, 1500);
            }
        }

        function submitCombatAction(choice, forceId = null, isBot = false) {
            let actorId = forceId !== null ? forceId : myId;
            let cmb = state.combat;
            if (actorId === cmb.currentAttacker) cmb.attackerChoice = choice;
            if (actorId === cmb.currentDefender) cmb.defenderChoice = choice;
            syncState();
        }

        function resolveCombat() {
            let cmb = state.combat;
            let cAtk = cmb.currentAttacker; let cDef = cmb.currentDefender;
            let pAtk = cAtk === -1 ? cmb.defMonster : state.players[cAtk];
            let pDef = cDef === -1 ? cmb.defMonster : state.players[cDef];
            
            let atk = cmb.attackerChoice; let def = cmb.defenderChoice;
            let dDef = 0; let dAtk = 0; let log = `💥 [${atk}] VS [${def}]<br>`;

            if (atk === '🔥 ตีธรรมดา') {
                if (def === '🛡️ กันธรรมดา') dDef = pAtk.atk * 0.4;
                else if (def === '🛡️ กันหนัก') dDef = pAtk.atk * 1.5;
                else dDef = pAtk.atk;
            } else if (atk === '💥 ตีหนัก') {
                if (def === '🛡️ กันหนัก') dAtk = pDef.atk * 1.5;
                else dDef = pAtk.atk * 2.5;
            } else if (atk === '🔮 ตีเวท') {
                if (def === '🔮 กันเวท') dAtk = pDef.atk * 0.8;
                else dDef = pAtk.atk * 2.0;
            }

            pDef.hp = Math.max(0, Math.floor(pDef.hp - dDef));
            pAtk.hp = Math.max(0, Math.floor(pAtk.hp - dAtk));

            if (pDef.hp <= 0 || pAtk.hp <= 0) {
                let winner = pDef.hp <= 0 ? pAtk : pDef;
                let loser = pDef.hp <= 0 ? pDef : pAtk;
                let wId = pDef.hp <= 0 ? cAtk : cDef;
                let lId = pDef.hp <= 0 ? cDef : cAtk;
                
                log += `🏁 <b>${winner.name} ปลิดชีพศัตรูสำเร็จ!</b>`;
                cmb.log = log; syncState();
                setTimeout(() => endCombat(wId, lId), 2000);
            } else {
                cmb.currentAttacker = cDef; cmb.currentDefender = cAtk;
                cmb.attackerChoice = ""; cmb.defenderChoice = ""; cmb.resolving = false;
                cmb.log = log + "🔄 สลับฝั่งรุก-รับ!";
                syncState();
            }
        }

        function endCombat(wId, lId) {
            let logMsg = "";
            let pWinner = wId !== -1 ? state.players[wId] : null;
            let pLoser = lId !== -1 ? state.players[lId] : null;
            let defMonster = state.combat.defMonster;

            if (wId !== -1) { 
                // คนชนะ
                let gainedLv = lId === -1 ? defMonster.lv : pLoser.lv;
                let gainedGold = lId === -1 ? defMonster.lv * 20 : Math.floor(pLoser.gold / 2); // ชนะคนได้เงินครึ่งนึงของศัตรู
                
                pWinner.lv += gainedLv; pWinner.atk += gainedLv * 5; pWinner.maxHp += gainedLv * 10; pWinner.hp = pWinner.maxHp;
                pWinner.gold += gainedGold;
                logMsg += `🏆 <b>${pWinner.name}</b> ชนะ! LV+${gainedLv} (เป็น LV.${pWinner.lv}) ได้เงิน 💰${gainedGold} G`;

                if (lId !== -1) {
                    pLoser.hp = 10; pLoser.isStunned = true; pLoser.position = 0; pLoser.gold -= gainedGold;
                    logMsg += ` และเตะ <b>${pLoser.name}</b> กลับบ้าน!`;
                }
            } else {
                // มอนสเตอร์ชนะ
                pLoser.hp = 10; pLoser.isStunned = true; pLoser.position = 0;
                let lostGold = Math.floor(pLoser.gold / 3); pLoser.gold -= lostGold;
                logMsg += `💀 <b>${pLoser.name}</b> แพ้มอนสเตอร์ ของตก 💰${lostGold} G ถูกหามส่งปราสาท!`;
            }

            pushLog(logMsg);
            state.combat.active = false;
            
            // เช็คจบเกม
            if (pWinner && pWinner.lv >= 50) {
                state.gameActive = false; pushLog(`🎉👑🏆 <b>${pWinner.name} ชนะเกมส์แล้ว (LV 50)!</b>`); alert(`${pWinner.name} คือผู้ชนะ!`);
            }
            
            nextTurn();
        }
    </script>
